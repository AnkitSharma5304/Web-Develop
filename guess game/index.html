<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess-Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <h1>Guess Gameeee</h1>
        <p>Guess a Number between 1 and 100 (Only 11 attempts)</p>
        <input type="number" class="guess-input" placeholder="enter the number">
         <button class="guess-check">Submit</button>
         <p id="remarks"></p>
         <p id="attempts">Attempts : 0</p>
         <button class="reset">Reset</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
